<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>手机转盘抽奖</title>
  <link rel="stylesheet" href="./style.css?v=20260307-3" />
</head>
<body>
  <div class="bg-orb orb-a" aria-hidden="true"></div>
  <div class="bg-orb orb-b" aria-hidden="true"></div>

  <p id="accountBadge" class="account-badge" aria-live="polite"></p>

  <main class="mobile-app">
    <section class="wheel-wrap">
      <div class="pointer" aria-hidden="true"></div>
      <canvas id="wheel" width="560" height="560"></canvas>
      <div class="hub"></div>
    </section>

    <p id="result" class="result" aria-live="polite"></p>

    <button id="spinBtn" class="spin-btn" type="button">开始转动</button>
  </main>

  <a class="settings-fab" href="./setup.html" aria-label="设置奖项">设置</a>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-client.js?v=20260307-3"></script>
  <script src="./script.js?v=20260307-3"></script>
</body>
</html>
