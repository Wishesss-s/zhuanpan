<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>设置奖项</title>
  <link rel="stylesheet" href="./setup.css" />
</head>
<body>
  <main class="setup-app">
    <section class="panel">
      <h1>设置</h1>
      <p class="sub">在这里配置内容和数量，保存后会同步到转盘页面。</p>

      <div class="row">
        <input id="labelInput" type="text" placeholder="输入内容，例如：奶茶" maxlength="20" />
        <input id="countInput" type="number" min="1" max="100" value="1" />
        <button id="addBtn" type="button">添加</button>
      </div>

      <ul id="itemList" class="item-list"></ul>

      <div class="actions">
        <button id="saveBtn" class="primary" type="button">保存到转盘</button>
        <button id="resetBtn" type="button">恢复默认</button>
      </div>
    </section>

    <a class="back" href="./index.html">返回转盘</a>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-client.js"></script>
  <script src="./setup.js"></script>
</body>
</html>
