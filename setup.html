<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>设置奖项</title>
  <meta name="theme-color" content="#f5f5f7" />
  <link rel="stylesheet" href="./setup.css?v=20260307-5" />
</head>
<body>
  <main class="setup-app">
    <section class="panel">
      <h1>设置</h1>
      <p class="sub">在这里配置内容和数量，支持拖拽排序，保存后会同步到当前转盘。</p>

      <div class="row">
        <input id="labelInput" type="text" placeholder="输入内容" maxlength="20" />
        <input id="countInput" type="number" min="1" max="100" value="1" />
        <button id="addBtn" type="button">添加</button>
      </div>

      <ul id="itemList" class="item-list"></ul>

      <div class="actions">
        <button id="saveBtn" class="primary" type="button">保存到转盘</button>
        <button id="resetBtn" type="button">恢复默认</button>
      </div>

      <button id="accountOpenBtn" class="account-entry" type="button">转盘</button>
    </section>

    <a class="back" href="./index.html">返回转盘</a>
  </main>

  <div id="accountModal" class="account-modal" aria-hidden="true">
    <div id="accountBackdrop" class="account-backdrop"></div>
    <section class="account-sheet" role="dialog" aria-modal="true" aria-labelledby="accountTitle">
      <div class="sheet-head">
        <h2 id="accountTitle">转盘管理</h2>
        <button id="accountCloseBtn" class="sheet-close" type="button">完成</button>
      </div>

      <p id="accountInfo" class="account-info">当前转盘：默认转盘</p>

      <div class="account-row">
        <div id="accountPicker" class="picker">
          <button id="accountPickerBtn" class="picker-btn" type="button" aria-expanded="false">
            <span id="accountPickerLabel">默认转盘</span>
            <span class="select-chevron" aria-hidden="true"></span>
          </button>
          <ul id="accountPickerList" class="picker-list" hidden></ul>
        </div>
        <button id="switchAccountBtn" type="button">切换转盘</button>
      </div>

      <div class="account-row">
        <input id="newAccountInput" type="text" placeholder="输入转盘名称" maxlength="24" />
        <button id="registerAccountBtn" type="button">新建转盘</button>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-client.js?v=20260307-4"></script>
  <script src="./setup.js?v=20260307-4"></script>
</body>
</html>
